<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>

    <!-- Dark background -->
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080b10"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <!-- Accent cyan gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowStrong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Card bg gradients -->
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1420"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1420"/>
      <stop offset="100%" style="stop-color:#130d1f"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1420"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>

  <!-- Root background -->
  <rect width="900" height="600" fill="#080b10"/>

  <!-- Grid dots -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="rgba(0,229,255,0.08)"/>
  </pattern>
  <rect width="900" height="600" fill="url(#grid)"/>

  <!-- === CONCEPT 1: Top-Left === -->
  <!-- Card -->
  <rect x="30" y="30" width="260" height="200" rx="10" fill="url(#card1)" stroke="#1c2438" stroke-width="1"/>
  <rect x="30" y="30" width="260" height="2" rx="1" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Label -->
  <text x="46" y="56" font-family="'JetBrains Mono', monospace" font-size="8" fill="#4a5568" letter-spacing="1.5">CONCEPT 01 · NEURAL NODE</text>

  <!-- Icon: Hexagonal node network -->
  <!-- Center hex -->
  <polygon points="160,90 175,99 175,117 160,126 145,117 145,99" fill="none" stroke="url(#accentGrad)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="160,96 170,102 170,114 160,120 150,114 150,102" fill="rgba(0,229,255,0.08)"/>

  <!-- Radiating nodes -->
  <circle cx="160" cy="108" r="4" fill="#00e5ff" filter="url(#glow)"/>

  <!-- Outer nodes -->
  <circle cx="130" cy="80" r="3" fill="#7c3aed" opacity="0.8"/>
  <circle cx="190" cy="80" r="3" fill="#7c3aed" opacity="0.8"/>
  <circle cx="118" cy="108" r="3" fill="#00e5ff" opacity="0.6"/>
  <circle cx="202" cy="108" r="3" fill="#00e5ff" opacity="0.6"/>
  <circle cx="130" cy="136" r="3" fill="#7c3aed" opacity="0.8"/>
  <circle cx="190" cy="136" r="3" fill="#7c3aed" opacity="0.8"/>

  <!-- Connection lines -->
  <line x1="133" y1="82" x2="148" y2="99" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="187" y1="82" x2="172" y2="99" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="121" y1="108" x2="145" y2="108" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="175" y1="108" x2="199" y2="108" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="133" y1="134" x2="148" y2="117" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="187" y1="134" x2="172" y2="117" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>

  <!-- Wordmark -->
  <text x="160" y="158" font-family="'Syne', 'Arial Black', sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">Neural<tspan fill="#00e5ff">Hub</tspan><tspan fill="#4a5568" font-size="16" dy="0">.ai</tspan></text>
  <text x="160" y="174" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#4a5568" text-anchor="middle" letter-spacing="3">TRAIN · BUILD · MASTER</text>

  <!-- === CONCEPT 2: Top-Right === -->
  <rect x="610" y="30" width="260" height="200" rx="10" fill="url(#card2)" stroke="#1c2438" stroke-width="1"/>
  <rect x="610" y="30" width="260" height="2" rx="1" fill="#7c3aed" opacity="0.8"/>

  <text x="626" y="56" font-family="'JetBrains Mono', monospace" font-size="8" fill="#4a5568" letter-spacing="1.5">CONCEPT 02 · CIRCUIT MARK</text>

  <!-- Icon: Circuit/chip aesthetic -->
  <!-- Main square chip -->
  <rect x="718" y="72" width="44" height="44" rx="4" fill="none" stroke="#7c3aed" stroke-width="2" filter="url(#glow)"/>
  <rect x="723" y="77" width="34" height="34" rx="2" fill="rgba(124,58,237,0.08)"/>

  <!-- NH letterform inside chip -->
  <text x="740" y="100" font-family="'Syne','Arial Black',sans-serif" font-size="18" font-weight="900" fill="url(#accentGrad)" text-anchor="middle" filter="url(#glow)">N</text>

  <!-- Circuit traces -->
  <line x1="718" y1="88" x2="706" y2="88" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <line x1="706" y1="88" x2="706" y2="82" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <circle cx="706" cy="82" r="2.5" fill="#7c3aed" opacity="0.8"/>

  <line x1="718" y1="100" x2="702" y2="100" stroke="#00e5ff" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
  <circle cx="702" cy="100" r="2.5" fill="#00e5ff" filter="url(#glow)"/>

  <line x1="718" y1="112" x2="706" y2="112" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <line x1="706" y1="112" x2="706" y2="118" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <circle cx="706" cy="118" r="2.5" fill="#7c3aed" opacity="0.8"/>

  <line x1="762" y1="88" x2="774" y2="88" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <line x1="774" y1="88" x2="774" y2="82" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <circle cx="774" cy="82" r="2.5" fill="#7c3aed" opacity="0.8"/>

  <line x1="762" y1="100" x2="778" y2="100" stroke="#00e5ff" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
  <circle cx="778" cy="100" r="2.5" fill="#00e5ff" filter="url(#glow)"/>

  <line x1="762" y1="112" x2="774" y2="112" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <line x1="774" y1="112" x2="774" y2="118" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <circle cx="774" cy="118" r="2.5" fill="#7c3aed" opacity="0.8"/>

  <!-- Wordmark -->
  <text x="740" y="158" font-family="'Syne','Arial Black',sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">Neural<tspan fill="#a78bfa">Hub</tspan><tspan fill="#4a5568" font-size="16">.ai</tspan></text>
  <text x="740" y="174" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="#4a5568" text-anchor="middle" letter-spacing="3">AI TRAINING PLATFORM</text>

  <!-- === CONCEPT 3: Bottom-Left === -->
  <rect x="30" y="370" width="260" height="200" rx="10" fill="url(#card3)" stroke="#1c2438" stroke-width="1"/>
  <rect x="30" y="370" width="260" height="2" rx="1" fill="#f97316" opacity="0.8"/>

  <text x="46" y="396" font-family="'JetBrains Mono',monospace" font-size="8" fill="#4a5568" letter-spacing="1.5">CONCEPT 03 · MINIMAL STACK</text>

  <!-- Icon: Stacked layers -->
  <g transform="translate(130, 400)">
    <!-- Three layered rectangles representing stack -->
    <rect x="-28" y="22" width="56" height="10" rx="3" fill="#f97316" opacity="0.3"/>
    <rect x="-22" y="13" width="44" height="10" rx="3" fill="#f97316" opacity="0.5"/>
    <rect x="-16" y="4" width="32" height="10" rx="3" fill="#f97316" opacity="0.8"/>

    <!-- Small dot accent -->
    <circle cx="0" cy="9" r="3" fill="#fff" opacity="0.9"/>

    <!-- Thin line under stack -->
    <line x1="-30" y1="36" x2="30" y2="36" stroke="#f97316" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Wordmark: compact, inline icon treatment -->
  <text x="160" y="498" font-family="'Syne','Arial Black',sans-serif" font-size="24" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1.5">NEURAL<tspan fill="#f97316">HUB</tspan></text>
  <text x="160" y="514" font-family="'JetBrains Mono',monospace" font-size="8" fill="#4a5568" text-anchor="middle" letter-spacing="4">.AI · THE BUILDER'S HUB</text>

  <!-- === CONCEPT 4: Bottom-Right (RECOMMENDED) === -->
  <rect x="610" y="370" width="260" height="200" rx="10" fill="#0b0e17" stroke="rgba(0,229,255,0.25)" stroke-width="1.5"/>
  <rect x="610" y="370" width="260" height="2" rx="1" fill="url(#accentGrad)"/>

  <!-- RECOMMENDED badge -->
  <rect x="786" y="378" width="76" height="16" rx="3" fill="rgba(0,229,255,0.12)" stroke="rgba(0,229,255,0.25)" stroke-width="0.8"/>
  <text x="824" y="390" font-family="'JetBrains Mono',monospace" font-size="7" fill="#00e5ff" text-anchor="middle" letter-spacing="1.5">RECOMMENDED</text>

  <text x="626" y="396" font-family="'JetBrains Mono',monospace" font-size="8" fill="#4a5568" letter-spacing="1.5">CONCEPT 04 · DYNAMIC MARK</text>

  <!-- Icon: Slash/forward-arrow made of layered strokes -->
  <g transform="translate(740,430)" filter="url(#glowStrong)">
    <!-- N shape abstracted as forward-slash mark -->
    <!-- Bold diagonal strike through -->
    <line x1="-18" y1="22" x2="18" y2="-22" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Left vertical -->
    <line x1="-18" y1="-22" x2="-18" y2="22" stroke="#00e5ff" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Right vertical -->
    <line x1="18" y1="-22" x2="18" y2="22" stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Small tick / hub dot at center intersection -->
    <circle cx="0" cy="0" r="4" fill="#00e5ff" opacity="0.9"/>
    <circle cx="0" cy="0" r="7" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="740" y="498" font-family="'Syne','Arial Black',sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1.5">Neural<tspan fill="#00e5ff">Hub</tspan><tspan fill="rgba(74,85,104,0.9)" font-size="18" dy="1">.ai</tspan></text>
  <text x="740" y="516" font-family="'JetBrains Mono',monospace" font-size="7.5" fill="rgba(0,229,255,0.45)" text-anchor="middle" letter-spacing="3.5">TRAIN · BUILD · MASTER AI</text>

  <!-- Center title -->
  <text x="450" y="316" font-family="'Syne','Arial Black',sans-serif" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle" letter-spacing="-0.5">neuraldrift — Logo Concepts</text>
  <text x="450" y="334" font-family="'JetBrains Mono',monospace" font-size="8" fill="#4a5568" text-anchor="middle" letter-spacing="2">4 DIRECTIONS · DARK THEME · SVG SCALABLE</text>

  <!-- Connector lines between cards (decorative) -->
  <line x1="290" y1="130" x2="610" y2="130" stroke="#1c2438" stroke-width="0.8" stroke-dasharray="4,6"/>
  <line x1="290" y1="470" x2="610" y2="470" stroke="#1c2438" stroke-width="0.8" stroke-dasharray="4,6"/>
  <line x1="450" y1="230" x2="450" y2="370" stroke="#1c2438" stroke-width="0.8" stroke-dasharray="4,6"/>

</svg>
