<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="runcomfy-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#runcomfy-bg)"/>
  
  <!-- Workflow nodes -->
  <g opacity="0.4">
    <rect x="150" y="120" width="100" height="60" rx="8" fill="none" stroke="#a855f7" stroke-width="2"/>
    <rect x="350" y="100" width="100" height="60" rx="8" fill="none" stroke="#a855f7" stroke-width="2"/>
    <rect x="350" y="200" width="100" height="60" rx="8" fill="none" stroke="#a855f7" stroke-width="2"/>
    <rect x="550" y="150" width="100" height="60" rx="8" fill="none" stroke="#a855f7" stroke-width="2"/>
    
    <line x1="250" y1="150" x2="350" y2="130" stroke="#a855f7" stroke-width="2"/>
    <line x1="250" y1="150" x2="350" y2="230" stroke="#a855f7" stroke-width="2"/>
    <line x1="450" y1="130" x2="550" y2="180" stroke="#a855f7" stroke-width="2"/>
    <line x1="450" y1="230" x2="550" y2="180" stroke="#a855f7" stroke-width="2"/>
  </g>
  
  <!-- Center icon -->
  <g transform="translate(400, 200)">
    <circle r="50" fill="#a855f7" opacity="0.2"/>
    <path d="M -20,-10 L -20,10 L 0,20 L 20,10 L 20,-10 L 0,-20 Z" fill="none" stroke="#a855f7" stroke-width="3"/>
  </g>
  
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#a855f7" text-anchor="middle">
    RunComfy
  </text>
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="16" fill="#666" text-anchor="middle">
    Dedicated ComfyUI Cloud
  </text>
</svg>
