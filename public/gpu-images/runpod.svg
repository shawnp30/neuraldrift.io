<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="runpod-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="runpod-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#runpod-bg)"/>
  
  <!-- Circuit pattern -->
  <g opacity="0.15">
    <circle cx="150" cy="100" r="3" fill="#f59e0b"/>
    <circle cx="250" cy="150" r="3" fill="#f59e0b"/>
    <circle cx="350" cy="120" r="3" fill="#f59e0b"/>
    <circle cx="450" cy="180" r="3" fill="#f59e0b"/>
    <circle cx="550" cy="140" r="3" fill="#f59e0b"/>
    <circle cx="650" cy="160" r="3" fill="#f59e0b"/>
    <line x1="150" y1="100" x2="250" y2="150" stroke="#f59e0b" stroke-width="1"/>
    <line x1="250" y1="150" x2="350" y2="120" stroke="#f59e0b" stroke-width="1"/>
    <line x1="350" y1="120" x2="450" y2="180" stroke="#f59e0b" stroke-width="1"/>
    <line x1="450" y1="180" x2="550" y2="140" stroke="#f59e0b" stroke-width="1"/>
    <line x1="550" y1="140" x2="650" y2="160" stroke="#f59e0b" stroke-width="1"/>
  </g>
  
  <!-- GPU chip icon -->
  <g transform="translate(400, 180)">
    <rect x="-60" y="-60" width="120" height="120" rx="8" fill="url(#runpod-accent)" stroke="#f59e0b" stroke-width="2"/>
    <rect x="-40" y="-40" width="80" height="80" rx="4" fill="#1a1a1a" stroke="#f59e0b" stroke-width="1"/>
    
    <!-- Chip pins -->
    <rect x="-75" y="-30" width="15" height="4" fill="#f59e0b"/>
    <rect x="-75" y="-15" width="15" height="4" fill="#f59e0b"/>
    <rect x="-75" y="0" width="15" height="4" fill="#f59e0b"/>
    <rect x="-75" y="15" width="15" height="4" fill="#f59e0b"/>
    
    <rect x="60" y="-30" width="15" height="4" fill="#f59e0b"/>
    <rect x="60" y="-15" width="15" height="4" fill="#f59e0b"/>
    <rect x="60" y="0" width="15" height="4" fill="#f59e0b"/>
    <rect x="60" y="15" width="15" height="4" fill="#f59e0b"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#f59e0b" text-anchor="middle">
    RunPod
  </text>
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="16" fill="#666" text-anchor="middle">
    GPU Pods on Demand
  </text>
</svg>
