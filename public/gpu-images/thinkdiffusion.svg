<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="think-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#think-bg)"/>
  
  <!-- Brain/learning waves -->
  <g opacity="0.3">
    <path d="M 100,200 Q 150,150 200,200 T 300,200" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <path d="M 100,220 Q 150,170 200,220 T 300,220" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <path d="M 500,200 Q 550,150 600,200 T 700,200" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <path d="M 500,220 Q 550,170 600,220 T 700,220" fill="none" stroke="#3b82f6" stroke-width="3"/>
  </g>
  
  <!-- Book/learning icon -->
  <g transform="translate(400, 180)">
    <rect x="-50" y="-40" width="100" height="80" rx="4" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <line x1="-50" y1="-40" x2="0" y2="-20" stroke="#3b82f6" stroke-width="2"/>
    <line x1="50" y1="-40" x2="0" y2="-20" stroke="#3b82f6" stroke-width="2"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="15" x2="30" y2="15" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  </g>
  
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#3b82f6" text-anchor="middle">
    ThinkDiffusion
  </text>
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="16" fill="#666" text-anchor="middle">
    Managed ComfyUI + Education
  </text>
</svg>
