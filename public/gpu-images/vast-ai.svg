<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vast-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="vast-glow">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#vast-bg)"/>
  
  <!-- Network nodes -->
  <g opacity="0.3">
    <circle cx="200" cy="150" r="40" fill="url(#vast-glow)"/>
    <circle cx="400" cy="100" r="50" fill="url(#vast-glow)"/>
    <circle cx="600" cy="150" r="40" fill="url(#vast-glow)"/>
    <circle cx="300" cy="250" r="35" fill="url(#vast-glow)"/>
    <circle cx="500" cy="250" r="35" fill="url(#vast-glow)"/>
    
    <line x1="200" y1="150" x2="400" y2="100" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="400" y1="100" x2="600" y2="150" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="200" y1="150" x2="300" y2="250" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="600" y1="150" x2="500" y2="250" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="300" y1="250" x2="500" y2="250" stroke="#10b981" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Center icon -->
  <g transform="translate(400, 180)">
    <circle r="60" fill="none" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <circle r="45" fill="none" stroke="#10b981" stroke-width="2" opacity="0.7"/>
    <circle r="30" fill="#10b981" opacity="0.3"/>
    
    <!-- Dollar sign -->
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#10b981" text-anchor="middle">
      $
    </text>
  </g>
  
  <!-- Text -->
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#10b981" text-anchor="middle">
    Vast.ai
  </text>
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="16" fill="#666" text-anchor="middle">
    Cheapest GPU Marketplace
  </text>
</svg>
