<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spheron-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="spheron-glow">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#spheron-bg)"/>
  
  <!-- Orbital rings -->
  <g transform="translate(400, 200)">
    <ellipse rx="120" ry="40" fill="none" stroke="#f43f5e" stroke-width="2" opacity="0.4"/>
    <ellipse rx="80" ry="100" fill="none" stroke="#f43f5e" stroke-width="2" opacity="0.4" transform="rotate(45)"/>
    <ellipse rx="100" ry="60" fill="none" stroke="#f43f5e" stroke-width="2" opacity="0.4" transform="rotate(-30)"/>
    
    <!-- Center sphere -->
    <circle r="40" fill="url(#spheron-glow)"/>
    <circle r="25" fill="#f43f5e" opacity="0.8"/>
    
    <!-- Lightning bolt for speed -->
    <path d="M 0,-15 L -8,0 L 0,0 L -5,15 L 8,-5 L 0,-5 Z" fill="#fff" opacity="0.9"/>
  </g>
  
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#f43f5e" text-anchor="middle">
    Spheron Network
  </text>
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="16" fill="#666" text-anchor="middle">
    RTX 5090 Cloud GPU
  </text>
</svg>
